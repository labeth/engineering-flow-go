name: engflow-gate

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and test
        run: go test ./...

      - name: Run engflow gate
        run: go run ./cmd/engflow gate --feature engflow-mvp --config .engflow/config.yml
